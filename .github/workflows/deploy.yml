name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 푸시될 때마다 실행됩니다.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 깃허브가 제공하는 가상의 우분투 컴퓨터에서 실행

    steps:
      # 1. 깃허브 레포지토리의 코드를 가상 컴퓨터로 가져옵니다.
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. 주니어님 환경에 맞춘 Java 17 (Corretto) 세팅
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      # 3. Gradle 빌드를 위한 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 스프링 부트 프로젝트 빌드 (테스트는 시간상 생략)
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 5. 도커 허브 로그인 (아까 등록한 Secret 사용!)
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 6. 도커 이미지 빌드 및 허브로 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # 태그명: [도커허브아이디]/startup-api-server:latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/startup-api-server:latest

      # 7. EC2 접속 및 도커 컨테이너 실행 (자동 배포의 하이라이트!)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 기존에 돌고 있는 자바(수동 배포) 프로세스가 있다면 종료 (포트 충돌 방지)
            sudo fuser -k -n tcp 8080 || true
            
            # 기존에 돌고 있는 도커 컨테이너가 있다면 중지 및 삭제
            sudo docker stop startup-server || true
            sudo docker rm startup-server || true
            
            # 도커 허브에서 방금 만든 최신 이미지 가져오기
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/startup-api-server:latest
            
            # 도커 컨테이너 실행! (-d: 백그라운드, -p 8080:8080 포트 연결)
            sudo docker run -d --name startup-server -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/startup-api-server:latest
            
            # 안 쓰는 이전 버전 이미지 삭제 (EC2 용량 꽉 차는 것 방지)
            sudo docker image prune -a -f