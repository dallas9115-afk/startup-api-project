name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # v3 -> v4로 업데이트

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # v3 -> v4로 업데이트
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3 # v2 -> v3로 업데이트
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5 # v4 -> v5로 업데이트
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/startup-api-server:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo fuser -k -n tcp 8080 || true
            sudo docker stop startup-server || true
            sudo docker rm startup-server || true
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/startup-api-server:latest
            sudo docker run -d --name startup-server -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/startup-api-server:latest
            sudo docker image prune -a -f